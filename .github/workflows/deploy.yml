name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: realdogs.com.au
          username: u443086656
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /domains/realdogs.com.au/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/worker/**
            .DS_Store
