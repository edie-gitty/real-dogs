name = "real-dogs-worker"
main = "index.js"
compatibility_date = "2024-09-23"

# ── KV Storage for stories ──────────────────────────────────────────────────
# Run this once to create the namespace, then paste the id below:
#   wrangler kv namespace create STORIES
[[kv_namespaces]]
binding = "STORIES"
id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# ── Secrets (set via CLI, never stored here) ────────────────────────────────
# wrangler secret put ANTHROPIC_API_KEY
# wrangler secret put ADMIN_PASSWORD
